<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beheerportaal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f9; padding: 40px; color: #333; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #222; }
        .form-groep { margin-bottom: 20px; max-width: 600px;}
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="file"], input[type="text"], input[type="email"], input[type="password"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background-color: #f8f9fa; font-size: 16px; margin-bottom: 10px; }
        button { background-color: #28a745; color: white; border: none; padding: 12px 20px; cursor: pointer; font-size: 14px; border-radius: 4px; }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        #status-melding, #login-error { margin-top: 15px; font-weight: bold; color: #0066cc; }
        #login-error { color: #dc3545; }
        
        /* NIEUW: De Grid Layout voor de schilderijen */
        ul { list-style-type: none; padding: 0; }
        
        #schilderijen-lijst {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Dwingt 4 naast elkaar op grote schermen */
        @media (min-width: 1024px) {
            #schilderijen-lijst {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        li { 
            background: #f9f9f9; 
            border: 1px solid #ddd; 
            display: flex; 
            flex-direction: column; 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .admin-kaart-afbeelding {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #eee;
            background-color: #ebebeb;
        }

        .admin-kaart-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        
        li.status-gereserveerd .admin-kaart-content { background-color: #fff3cd; }
        li.status-niet-beschikbaar .admin-kaart-content { background-color: #e2e3e5; }
        
        .koper-info { display: block; font-size: 0.9em; color: #856404; margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 5px;}
        .reserve-info { display: block; font-size: 0.85em; color: #666; margin-top: 5px; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 3px; }
        
        .actie-knoppen { display: flex; flex-direction: column; gap: 8px; margin-top: auto; padding-top: 15px; }
        .verwijder-knop { background-color: #dc3545; padding: 8px; width: 100%; font-weight: bold;}
        .verwijder-knop:hover { background-color: #c82333; }
        .beschikbaar-knop { background-color: #007bff; padding: 8px; width: 100%; font-weight: bold;}
        .beschikbaar-knop:hover { background-color: #0056b3; }
        .bewerk-knop { background-color: #ffc107; color: #000; padding: 8px; width: 100%; font-weight: bold;}
        .bewerk-knop:hover { background-color: #e0a800; }
        
        .uitlog-knop { background-color: #6c757d; float: right; padding: 8px 15px; font-size: 12px; margin-top: -5px; }
        .uitlog-knop:hover { background-color: #5a6268; }
        
        #login-scherm { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f9; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        
        .login-logo { display: block; margin: 0 auto 25px auto; max-width: 180px; height: auto; }
        
        #edit-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 400px; max-width: 90%; max-height: 90%; overflow-y: auto; }
        
        #admin-paneel { display: none; }
    </style>
</head>
<body>

    <div id="login-scherm">
        <div class="login-box">
            <img src="login-logo.png" alt="Dineke Schilderijen Logo" class="login-logo" onerror="this.style.display='none'">
            <h2 style="margin-top:0; text-align: center;">Beheer login</h2>
            <form id="login-form">
                <label>E-mailadres:</label>
                <input type="email" id="login-email" required placeholder="jouw@email.nl">
                <label>Wachtwoord:</label>
                <input type="password" id="login-wachtwoord" required placeholder="******">
                <button type="submit" style="width:100%; margin-top:10px;">Inloggen</button>
            </form>
            <div id="login-error"></div>
        </div>
    </div>

    <div id="admin-paneel" class="container">
        <button class="uitlog-knop" onclick="uitloggen()">Uitloggen</button>
        <h1>Schilderijen toevoegen</h1>

        <form id="upload-form">
            <div class="form-groep">
                <label>Foto's:</label>
                <input type="file" id="foto" accept="image/*" multiple required>
            </div>
            <div class="form-groep">
                <label>Formaat:</label>
                <select id="formaat" required>
                    <option value="Groot">Groot</option>
                    <option value="Middelgroot">Middelgroot</option>
                    <option value="Middel">Middel</option>
                    <option value="Klein">Klein</option>
                </select>
                
                <label>Type:</label>
                <select id="type" required>
                    <option value="Doek">Doek</option>
                    <option value="Paneel">Paneel</option>
                    <option value="Papier">Papier</option>
                </select>

                <label>Sfeer:</label>
                <select id="sfeer" required>
                    <option value="Bloemen">Bloemen</option>
                    <option value="Mensen">Mensen</option>
                    <option value="Zeegezichten">Zeegezichten</option>
                    <option value="Landschappen">Landschappen</option>
                    <option value="Abstract">Abstract</option>
                    <option value="Overig">Overig</option>
                </select>

                <label>Kleurtint:</label>
                <select id="kleurtint" required>
                    <option value="Rood">Rood</option>
                    <option value="Blauw">Blauw</option>
                    <option value="Geel">Geel</option>
                    <option value="Groen">Groen</option>
                    <option value="Oranje">Oranje</option>
                    <option value="Paars">Paars</option>
                    <option value="Roze">Roze</option>
                    <option value="Bruin">Bruin</option>
                    <option value="Zwart">Zwart</option>
                    <option value="Wit">Wit</option>
                    <option value="Grijs">Grijs</option>
                    <option value="Overig" selected>Overig</option>
                </select>

                <label>Lijst (Vrij invullen):</label>
                <input type="text" id="lijst" placeholder="Bijv. Eikenhouten lijst, geen lijst, etc." required>
            </div>
            <button type="submit" id="upload-knop">Upload schilderij(en)</button>
        </form>

        <div id="status-melding"></div>
        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">
        <h2>Huidige schilderijen (Beheer)</h2>
        <ul id="schilderijen-lijst"><li>Laden... ⏳</li></ul>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <h3>Gegevens bewerken</h3>
            <label>Status:</label>
            <select id="edit-status">
                <option value="beschikbaar">Beschikbaar</option>
                <option value="gereserveerd">Gereserveerd</option>
                <option value="niet-beschikbaar">Niet meer beschikbaar</option>
            </select>
            <label>Formaat:</label>
            <select id="edit-formaat">
                <option value="Groot">Groot</option>
                <option value="Middelgroot">Middelgroot</option>
                <option value="Middel">Middel</option>
                <option value="Klein">Klein</option>
            </select>
            <label>Type:</label>
            <select id="edit-type">
                <option value="Doek">Doek</option>
                <option value="Paneel">Paneel</option>
                <option value="Papier">Papier</option>
            </select>
            <label>Sfeer:</label>
            <select id="edit-sfeer">
                <option value="Bloemen">Bloemen</option>
                <option value="Mensen">Mensen</option>
                <option value="Zeegezichten">Zeegezichten</option>
                <option value="Landschappen">Landschappen</option>
                <option value="Abstract">Abstract</option>
                <option value="Overig">Overig</option>
            </select>
            <label>Kleurtint:</label>
            <select id="edit-kleurtint">
                <option value="Rood">Rood</option>
                <option value="Blauw">Blauw</option>
                <option value="Geel">Geel</option>
                <option value="Groen">Groen</option>
                <option value="Oranje">Oranje</option>
                <option value="Paars">Paars</option>
                <option value="Roze">Roze</option>
                <option value="Bruin">Bruin</option>
                <option value="Zwart">Zwart</option>
                <option value="Wit">Wit</option>
                <option value="Grijs">Grijs</option>
                <option value="Overig">Overig</option>
            </select>
            <label>Lijst (Vrij invullen):</label>
            <input type="text" id="edit-lijst" placeholder="Bijv. Eikenhouten lijst">
            
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="slaBewerkingOp()">Opslaan</button>
                <button onclick="sluitEditModal()" style="background-color: #6c757d;">Annuleren</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-storage-compat.js"></script>

    <script>
        try {
            const firebaseConfig = {
                apiKey: "AIzaSyBvA_Jck1PO6CDbI1cngZBpxO2ETAb9_GY",
                authDomain: "paintings-be46b.firebaseapp.com",
                projectId: "paintings-be46b",
                storageBucket: "paintings-be46b.firebasestorage.app",
                messagingSenderId: "176727832277",
                appId: "1:176727832277:web:aa51107213ed9d7a8b945c"
            };
            firebase.initializeApp(firebaseConfig);
            
            const db = firebase.firestore();
            const storage = firebase.storage();
            const auth = firebase.auth();

            const form = document.getElementById('upload-form');
            const loginForm = document.getElementById('login-form');
            const statusMelding = document.getElementById('status-melding');
            const loginError = document.getElementById('login-error');
            let huidigBewerkId = null;

            auth.onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('login-scherm').style.display = 'none';
                    document.getElementById('admin-paneel').style.display = 'block';
                    laadSchilderijenLijst();
                } else {
                    document.getElementById('login-scherm').style.display = 'flex';
                    document.getElementById('admin-paneel').style.display = 'none';
                }
            });

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const wachtwoord = document.getElementById('login-wachtwoord').value;
                loginError.innerText = "Bezig met inloggen... ⏳";
                
                try {
                    await auth.signInWithEmailAndPassword(email, wachtwoord);
                    loginError.innerText = "";
                } catch (error) {
                    console.error(error);
                    loginError.innerText = "❌ Inloggen mislukt. Controleer e-mail en wachtwoord.";
                }
            });

            window.uitloggen = function() {
                auth.signOut();
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault(); 
                const bestanden = document.getElementById('foto').files;
                if (bestanden.length === 0) return;

                document.getElementById('upload-knop').disabled = true;
                statusMelding.innerText = "Bezig met scannen van huidige nummers... ⏳";

                try {
                    const snapshot = await db.collection('schilderijen').get();
                    let hoogsteNummer = 0;
                    
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.titel) {
                            const match = data.titel.match(/\d+/);
                            if (match) {
                                const getal = parseInt(match[0], 10);
                                if (getal > hoogsteNummer) hoogsteNummer = getal;
                            }
                        }
                    });

                    let successAantal = 0;
                    for (let i = 0; i < bestanden.length; i++) {
                        hoogsteNummer++; 
                        let volgNummer = hoogsteNummer < 10 ? '0' + hoogsteNummer : hoogsteNummer.toString();
                        let nieuweTitel = `Schilderij ${volgNummer}`;
                        
                        const bestand = bestanden[i];
                        const extensie = bestand.name.split('.').pop();
                        const opgeslagenBestandsnaam = `Schilderij_${volgNummer}_${Date.now()}.${extensie}`; 

                        statusMelding.innerText = `Bezig met uploaden: ${nieuweTitel} (${i + 1} van de ${bestanden.length})... ⏳`;

                        const opslagReferentie = storage.ref('fotos/' + opgeslagenBestandsnaam);
                        await opslagReferentie.put(bestand);
                        const fotoLink = await opslagReferentie.getDownloadURL();

                        await db.collection('schilderijen').add({
                            titel: nieuweTitel,
                            afbeelding_url: fotoLink,
                            status: 'beschikbaar',
                            formaat: document.getElementById('formaat').value,
                            type: document.getElementById('type').value,
                            sfeer: document.getElementById('sfeer').value,
                            kleurtint: document.getElementById('kleurtint').value,
                            lijst: document.getElementById('lijst').value,
                            reservelijst: []
                        });
                        
                        successAantal++;
                    }
                    
                    statusMelding.innerText = `✅ Klaar! ${successAantal} schilderij(en) succesvol toegevoegd en hernoemd.`;
                    form.reset();
                    laadSchilderijenLijst(); 
                    
                } catch (error) {
                    console.error(error);
                    statusMelding.innerText = `❌ Er is een fout opgetreden bij het uploaden: ${error.message}`;
                } finally {
                    document.getElementById('upload-knop').disabled = false;
                }
            });

            async function laadSchilderijenLijst() {
                const lijst = document.getElementById('schilderijen-lijst');
                try {
                    const querySnapshot = await db.collection("schilderijen").get();
                    lijst.innerHTML = '';
                    
                    if (querySnapshot.empty) {
                        lijst.innerHTML = '<li>Nog geen schilderijen gevonden in de database.</li>';
                        return;
                    }

                    let schilderijenArray = [];
                    querySnapshot.forEach((doc) => {
                        schilderijenArray.push({ id: doc.id, ...doc.data() });
                    });

                    schilderijenArray.sort((a, b) => {
                        return (a.titel || "").localeCompare(b.titel || "", undefined, { numeric: true });
                    });
                    
                    schilderijenArray.forEach((data) => {
                        const li = document.createElement('li');
                        
                        const s = data.status || "beschikbaar";
                        if (s === 'gereserveerd') li.className = 'status-gereserveerd';
                        if (s === 'niet-beschikbaar') li.className = 'status-niet-beschikbaar';
                        
                        let statusWeergave = s.charAt(0).toUpperCase() + s.slice(1);
                        let statusKleur = "#17a2b8";
                        if (s === 'niet-beschikbaar') {
                            statusWeergave = 'Niet meer beschikbaar';
                            statusKleur = '#6c757d';
                        } else if (s === 'gereserveerd') {
                            statusKleur = '#ffc107';
                        } else if (s === 'beschikbaar') {
                            statusKleur = '#28a745';
                        }
                        
                        const f = data.formaat || "Onbekend";
                        const t = data.type || "Onbekend";
                        const sf = data.sfeer || "Overig";
                        const kt = data.kleurtint || "Overig";
                        const l = data.lijst ? String(data.lijst) : "Onbekend";
                        
                        let infoHtml = `<strong style="font-size: 1.1em;">${data.titel}</strong> <span style="background:${statusKleur}; color:white; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; margin-left: 8px; vertical-align: middle;">${statusWeergave}</span><br><br><span style="font-size:0.9em; color:#444; line-height: 1.6;"><strong>Formaat:</strong> ${f}<br><strong>Type:</strong> ${t}<br><strong>Sfeer:</strong> ${sf}<br><strong>Kleurtint:</strong> ${kt}<br><strong>Lijst:</strong> ${l}</span>`;
                        
                        if (s === 'gereserveerd') {
                            infoHtml += `<div class="koper-info">👤 <strong>Geclaimd door:</strong><br>${data.koper_naam} (${data.koper_email})<br><em>"${data.koper_bericht || 'Geen bericht'}"</em></div>`;
                            
                            if (data.reservelijst && data.reservelijst.length > 0) {
                                data.reservelijst.forEach((res, index) => {
                                    infoHtml += `<div class="reserve-info">⏳ Reserve #${index + 1}: ${res.naam} (${res.email})</div>`;
                                });
                            }
                        }

                        const veiligeLijst = l.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        const veiligeKleurtint = kt.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        const veiligeSfeer = sf.replace(/'/g, "\\'");

                        // De nieuwe Card opbouw met afbeelding!
                        li.innerHTML = `
                            <img src="${data.afbeelding_url}" alt="${data.titel}" class="admin-kaart-afbeelding" loading="lazy">
                            <div class="admin-kaart-content">
                                <div style="margin-bottom: 10px;">${infoHtml}</div>
                                <div class="actie-knoppen">
                                    <button class="bewerk-knop" onclick="openEditModal('${data.id}', '${f}', '${t}', '${veiligeLijst}', '${s}', '${veiligeSfeer}', '${veiligeKleurtint}')">Kenmerken Bewerken</button>
                                    ${s === 'gereserveerd' ? `<button class="beschikbaar-knop" onclick="maakBeschikbaar('${data.id}')">Annuleer Reservering</button>` : ''}
                                    <button class="verwijder-knop" onclick="verwijderSchilderij('${data.id}')">Schilderij Verwijderen</button>
                                </div>
                            </div>
                        `;
                        lijst.appendChild(li);
                    });

                } catch (error) {
                    lijst.innerHTML = `<li style="color: red; font-weight: bold;">Fout bij laden database: ${error.message}</li>`;
                }
            }

            window.openEditModal = function(id, f, t, l, s, sf, kt) {
                huidigBewerkId = id;
                document.getElementById('edit-formaat').value = (f !== 'Onbekend') ? f : 'Groot';
                document.getElementById('edit-type').value = (t !== 'Onbekend') ? t : 'Doek';
                document.getElementById('edit-sfeer').value = (sf !== 'Onbekend') ? sf : 'Overig';
                document.getElementById('edit-lijst').value = (l !== 'Onbekend') ? l : '';
                document.getElementById('edit-status').value = s;
                
                const selectElement = document.getElementById('edit-kleurtint');
                const options = Array.from(selectElement.options).map(opt => opt.value);
                if(options.includes(kt)) {
                    selectElement.value = kt;
                } else {
                    selectElement.value = 'Overig';
                }

                document.getElementById('edit-modal').style.display = 'flex';
            };

            window.sluitEditModal = function() {
                document.getElementById('edit-modal').style.display = 'none';
                huidigBewerkId = null;
            };

            window.slaBewerkingOp = async function() {
                if(!huidigBewerkId) return;
                await db.collection("schilderijen").doc(huidigBewerkId).update({
                    formaat: document.getElementById('edit-formaat').value,
                    type: document.getElementById('edit-type').value,
                    sfeer: document.getElementById('edit-sfeer').value,
                    kleurtint: document.getElementById('edit-kleurtint').value,
                    lijst: document.getElementById('edit-lijst').value,
                    status: document.getElementById('edit-status').value
                });
                sluitEditModal();
                laadSchilderijenLijst();
            };

            window.maakBeschikbaar = async function(id) {
                const docRef = db.collection("schilderijen").doc(id);
                const docSnap = await docRef.get();
                const data = docSnap.data();

                if (data.reservelijst && data.reservelijst.length > 0) {
                    if(confirm("Er staat nog iemand op de reservelijst! Wil je het schilderij toewijzen aan reserve-persoon #1?")) {
                        const nieuweKoper = data.reservelijst[0];
                        const nieuweReservelijst = data.reservelijst.slice(1);
                        await docRef.update({
                            koper_naam: nieuweKoper.naam,
                            koper_email: nieuweKoper.email,
                            koper_bericht: nieuweKoper.bericht || '',
                            reservelijst: nieuweReservelijst
                        });
                        laadSchilderijenLijst();
                        return;
                    }
                } 
                
                if(confirm("Weet je zeker dat je dit schilderij weer voor iedereen 'beschikbaar' wilt maken? Alle huidige reserveringen worden gewist.")) {
                    await docRef.update({
                        status: 'beschikbaar',
                        koper_naam: firebase.firestore.FieldValue.delete(),
                        koper_email: firebase.firestore.FieldValue.delete(),
                        koper_bericht: firebase.firestore.FieldValue.delete(),
                        reservelijst: []
                    });
                    laadSchilderijenLijst();
                }
            };

            window.verwijderSchilderij = async function(id) {
                if(confirm("Let op: Weet je zeker dat je dit schilderij definitief wilt verwijderen?")) {
                    await db.collection("schilderijen").doc(id).delete();
                    laadSchilderijenLijst(); 
                }
            };
            
        } catch (error) {
            document.getElementById('login-error').innerText = "Systeemfout bij laden: " + error.message;
        }
    </script>
</body>
</html>
