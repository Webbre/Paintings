<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overzicht schilderijen Dineke Weeber-Walrecht</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hoofd-header">
        <h1>Overzicht schilderijen Dineke Weeber-Walrecht</h1>
        
        <div class="filter-knoppen">
            <button class="filter-knop actief">Alles</button>
            <button class="filter-knop">Beschikbaar</button>
            <button class="filter-knop">Gereserveerd</button>
        </div>
    </header>

    <main>
        <div class="galerij">
            <div class="schilderij-kaart beschikbaar">
                <img src="https://picsum.photos/800/600?random=1" alt="Schilderij 1">
                <h3>Schilderij 1 - Landschap</h3>
            </div>

            <div class="schilderij-kaart beschikbaar">
                <img src="https://picsum.photos/800/600?random=2" alt="Schilderij 2">
                <h3>Schilderij 2 - Abstract</h3>
            </div>

            <div class="schilderij-kaart gereserveerd">
                <img src="https://picsum.photos/800/600?random=3" alt="Schilderij 3">
                <h3>Schilderij 3 - Portret</h3>
                <div class="status-label">Gereserveerd</div>
            </div>
            
            <div class="schilderij-kaart beschikbaar">
                <img src="https://picsum.photos/800/600?random=4" alt="Schilderij 4">
                <h3>Schilderij 4 - Stilleven</h3>
            </div>
        </div>
    </main>

    <div id="lightbox" class="lightbox">
        <div class="lightbox-inhoud">
            <span class="sluit-knop">&times;</span>
            <img id="lightbox-foto" src="" alt="Vergrote foto">
            <h3 id="lightbox-titel">Titel</h3>
            
            <div id="reservering-gedeelte">
                <p>Reserveer dit schilderij:</p>
                <input type="text" id="koper-naam" placeholder="Jouw naam" required>
                <input type="email" id="koper-email" placeholder="Jouw e-mailadres" required>
                <button id="bevestig-reservering" class="reserveren-knop">Bevestig reservering</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
