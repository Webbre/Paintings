<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overzicht schilderijen Dineke Weeber-Walrecht</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hoofd-header">
        <img src="https://firebasestorage.googleapis.com/v0/b/paintings-be46b.firebasestorage.app/o/Painter.png?alt=media&token=cbb347b8-0656-44de-9916-6986d494cf02" alt="Dineke Weeber-Walrecht" class="profiel-foto">
        <h1>Overzicht schilderijen Dineke Weeber-Walrecht</h1>
        <p class="instructie-tekst">Klik op een beschikbaar schilderij om deze in detail te bekijken en eventueel direct te reserveren.</p>
        
        <div class="filter-knoppen">
            <button class="filter-knop actief">Alles</button>
            <button class="filter-knop">Beschikbaar</button>
            <button class="filter-knop">Gereserveerd</button>
        </div>
    </header>

    <main>
        <div class="galerij">
            </div>
    </main>

    <div id="lightbox" class="lightbox">
        <div class="lightbox-inhoud">
            <span class="sluit-knop">&times;</span>
            
            <div class="lightbox-flex-container">
                <div class="lightbox-links">
                    <img id="lightbox-foto" src="" alt="Vergrote foto">
                </div>
                
                <div class="lightbox-rechts">
                    <h3 id="lightbox-titel">Titel</h3>
                    
                    <div id="reservering-gedeelte">
                        <p>Reserveer dit schilderij:</p>
                        <input type="text" id="koper-naam" placeholder="Jouw naam" required>
                        <input type="email" id="koper-email" placeholder="Jouw e-mailadres" required>
                        <textarea id="koper-bericht" placeholder="Optioneel: Laat een berichtje achter..." rows="3"></textarea>
                        
                        <button id="bevestig-reservering" class="reserveren-knop">Bevestig reservering</button>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
