<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overzicht schilderijen Dineke Weeber-Walrecht</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hoofd-header">
        <h1>Overzicht schilderijen Dineke Weeber-Walrecht</h1>
        
        <div class="filter-knoppen">
            <button class="filter-knop actief">Alles</button>
            <button class="filter-knop">Beschikbaar</button>
            <button class="filter-knop">Gereserveerd</button>
        </div>
    </header>

    <main>
        <div class="galerij">
            <div class="schilderij-kaart beschikbaar">
                <img src="https://via.placeholder.com/800x600/eeeeee/888888?text=Foto+Schilderij+1" alt="Schilderij 1">
                <h3>Schilderij 1</h3>
            </div>

            <div class="schilderij-kaart beschikbaar">
                <img src="https://via.placeholder.com/800x600/eeeeee/888888?text=Foto+Schilderij+2" alt="Schilderij 2">
                <h3>Schilderij 2</h3>
            </div>

            <div class="schilderij-kaart gereserveerd">
                <img src="https://via.placeholder.com/800x600/eeeeee/888888?text=Foto+Schilderij+3" alt="Schilderij 3">
                <h3>Schilderij 3</h3>
                <div class="status-label">Gereserveerd</div>
            </div>
            
            <div class="schilderij-kaart beschikbaar">
                <img src="https://via.placeholder.com/800x600/eeeeee/888888?text=Foto+Schilderij+4" alt="Schilderij 4">
                <h3>Schilderij 4</h3>
            </div>
        </div>
    </main>

</body>
</html>
